<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luci Payment</title>

<style>
body {
  margin: 0;
  background: #0b0f14;
  font-family: Arial;
  color: white;
}

.logo {
  text-align: center;
  margin-top: 60px;
}

.logo h1 {
  font-size: 50px;
  color: gold;
}

.logo p {
  color: gold;
  font-size: 22px;
}

.container {
  width: 90%;
  max-width: 400px;
  margin: auto;
  margin-top: 30px;
}

.input-box {
  display: flex;
  align-items: center;
  background: #11161d;
  border-radius: 25px;
  padding: 14px;
  margin: 12px 0;
}

.input-box span {
  margin-right: 10px;
}

.input-box input {
  background: none;
  border: none;
  outline: none;
  color: white;
  width: 100%;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: #16a34a;
  color: white;
  font-size: 18px;
}

.link {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  color: #16a34a;
  font-size: 14px;
}

.center {
  text-align: center;
  margin-top: 10px;
  color: #16a34a;
}

#register {
  display: none;
}
</style>
</head>

<body>

<div class="logo">
  <h1>LP</h1>
  <p>Luci Payment</p>
</div>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <div class="input-box">
    <span>👤</span>
    <input type="text" id="phone" placeholder="Phone / Username">
  </div>

  <div class="input-box">
    <span>🔒</span>
    <input type="password" id="password" placeholder="Password">
  </div>

  <div class="link">
    <span onclick="showRegister()">Register</span>
    <span>Remember Me ✔</span>
  </div>

  <button onclick="login()">Sign In</button>

  <div class="center" onclick="resetPassword()">Forget Password</div>
</div>

<!-- REGISTER -->
<div id="register">
  <h2 style="text-align:center;color:#16a34a;">Register</h2>

  <div class="input-box">
    <span>👤</span>
    <input type="text" id="rphone" placeholder="Phone">
  </div>

  <div class="input-box">
    <span>🔒</span>
    <input type="password" id="rpass" placeholder="Password">
  </div>

  <button onclick="register()">Sign Up</button>

  <div class="center" onclick="showLogin()">Back to Login</div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz3fgsgoS1O3gEs_T8-NK9Ej4o-hkxvEo",
  authDomain: "lucipay-4f05c.firebaseapp.com",
  projectId: "lucipay-4f05c",
};

firebase.initializeApp(firebaseConfig);

// Switch screens
function showRegister(){
  document.getElementById("login").style.display="none";
  document.getElementById("register").style.display="block";
}

function showLogin(){
  document.getElementById("login").style.display="block";
  document.getElementById("register").style.display="none";
}

// Register
function register(){
  let phone = document.getElementById("rphone").value;
  let pass = document.getElementById("rpass").value;

  if(!phone || !pass){
    alert("Fill all fields");
    return;
  }

  let email = phone + "@lucipay.com";

  firebase.auth().createUserWithEmailAndPassword(email, pass)
  .then(()=>alert("Registered Successfully"))
  .catch(err=>alert(err.message));
}

// Login
function login(){
  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("password").value;

  let email = phone + "@lucipay.com";

  firebase.auth().signInWithEmailAndPassword(email, pass)
  .then(()=>alert("Login Success"))
  .catch(err=>alert(err.message));
}

// Forget Password
function resetPassword(){
  let phone = document.getElementById("phone").value;

  if(!phone){
    alert("Enter phone first");
    return;
  }

  let email = phone + "@lucipay.com";

  firebase.auth().sendPasswordResetEmail(email)
  .then(()=>alert("Reset link sent to email"))
  .catch(err=>alert(err.message));
}
</script>

</body>
</html>
