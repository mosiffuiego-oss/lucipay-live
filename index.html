<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        .lp-logo-circle {
            background: #000; color: #FFD700; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 50%; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            font-size: 2.2rem; border: 4px solid #FFD700; margin: 0 auto;
        }

        .btn-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.3);
        }

        /* STRICT NAVIGATION FIX */
        .nav-lock {
            position: fixed !important;
            bottom: 0 !important;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #eee;
            z-index: 9999;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Added padding to prevent content from going under the nav */
        .dashboard-scroll {
            padding-bottom: 120px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body x-data="luciApp()" class="bg-gray-50 font-sans">

    <div x-show="step === 'splash'" class="fixed inset-0 z-[10000] bg-white flex items-center justify-center">
        <h1 x-show="!showLogo" x-transition.duration.500ms class="text-6xl font-black text-emerald-600 italic tracking-tighter">LuciPay</h1>
        <div x-show="showLogo" x-transition:enter="transition duration-700" x-transition:enter-start="scale-0 rotate-180" x-transition:enter-end="scale-100 rotate-0" class="lp-logo-circle">LP</div>
    </div>

    <div x-show="step !== 'splash'" x-cloak class="min-h-screen flex flex-col items-center p-6" :class="view === 'dashboard' ? 'dashboard-scroll' : ''">
        
        <div x-show="view !== 'dashboard'" class="mt-2 mb-10 lp-logo-circle scale-75 anim-fade">LP</div>

        <div x-show="view === 'login'" class="w-full max-w-sm space-y-7 anim-fade">
            <h2 class="text-3xl font-black text-slate-900 text-center">Login LuciPay User</h2>
            <div class="space-y-4">
                <input type="number" placeholder="Phone Number" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-5 outline-none focus:border-emerald-500 font-semibold" x-model="loginPhone">
                <input type="password" placeholder="Password" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-5 outline-none focus:border-emerald-500 font-semibold" x-model="loginPass">
            </div>
            <button @click="handleLogin()" class="w-full btn-green text-white py-5 rounded-[22px] font-black text-lg uppercase tracking-widest">Login</button>
            <p class="text-center font-bold text-slate-400">New User? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer underline">Register</span></p>
        </div>

        <div x-show="view === 'register'" class="w-full max-w-sm space-y-4 anim-fade">
            <h2 class="text-3xl font-black text-center mb-2">Register</h2>
            <input type="text" placeholder="Username" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none font-semibold">
            <div class="flex gap-2">
                <span class="bg-slate-100 flex items-center px-4 rounded-2xl font-bold">+91</span>
                <input type="number" placeholder="Mobile Number" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none font-semibold">
            </div>
            <div class="flex gap-2">
                <input type="number" placeholder="OTP" class="w-full bg-white border-2 border
