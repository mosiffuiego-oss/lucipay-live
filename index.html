<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay - Premium Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .emerald-grad { background: linear-gradient(180deg, #10b981 0%, #064e3b 100%); }
        .input-box { background: #f9fafb; border: 1.5px solid #e5e7eb; border-radius: 16px; padding: 16px; width: 100%; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #10b981; background: #ffffff; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1); }
        
        /* Animation Styles */
        @keyframes shrink {
            0% { transform: scale(1.2); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; }
        }
        .splash-anim { animation: shrink 2.5s forwards; }
    </style>
</head>
<body x-data="luciApp()" x-init="init()" class="bg-slate-50 font-sans">

    <div x-show="screen === 'splash'" class="fixed inset-0 z-50 bg-white flex flex-col items-center justify-center">
        <h1 class="text-6xl font-black text-emerald-600 italic tracking-tighter splash-anim">LuciPay</h1>
        <div x-show="showLogo" x-transition.duration.500ms class="w-28 h-28 bg-emerald-600 rounded-[2.5rem] flex items-center justify-center text-white text-5xl font-black italic shadow-2xl">LP</div>
    </div>

    <div x-show="screen !== 'splash'" x-cloak class="min-h-screen max-w-md mx-auto p-6 flex flex-col items-center">
        
        <div class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl font-black italic shadow-lg mb-10">LP</div>

        <div x-show="view === 'login'" class="w-full space-y-5">
            <div class="text-left mb-8">
                <h2 class="text-3xl font-black text-emerald-900">Welcome Back</h2>
                <p class="text-gray-500 font-medium">Securely login to your account</p>
            </div>
            
            <input type="number" placeholder="Mobile Number" class="input-box" x-model="loginPhone">
            <input type="password" placeholder="Password" class="input-box" x-model="loginPass">
            
            <div class="flex items-center justify-between px-1">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" x-model="rememberMe" class="w-4 h-4 text-emerald-600 rounded border-gray-300">
                    <span class="text-sm font-bold text-gray-600">Remember Me</span>
                </label>
                <button @click="view = 'forget'" class="text-sm font-bold text-emerald-600 uppercase tracking-tight">Forgot Password?</button>
            </div>

            <button @click="doLogin()" class="w-full emerald-grad text-white py-5 rounded-[20px] font-black shadow-xl active:scale-95 transition-transform">LOG IN</button>
            
            <p class="text-center text-sm font-bold text-gray-400">
                Don't have an account? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer">Register Now</span>
            </p>
        </div>

        <div x-show="view === 'register'" class="w-full space-y-4">
            <h2 class="text-3xl font-black text-emerald-900 text-left mb-6">Create Account</h2>
            
            <input type="text" placeholder="Full Name" class="input-box">
            
            <div class="flex gap-2">
                <span class="bg-emerald-100 p-4 rounded-2xl font-black text-emerald-700">+91</span>
                <input type="number" placeholder="Mobile Number" class="input-box">
            </div>

            <div class="flex gap-2">
                <input type="number" placeholder="4-Digit OTP" class="input-box">
                <button @click="sendOTP()" class="bg-emerald-600 text-white px-6 rounded-2xl text-xs font-black uppercase shadow-md">Send</button>
            </div>

            <input type="password" placeholder="Create Password" class="input-box">
            <input type="text" placeholder="Invite Code (Optional)" class="input-box border-dashed border-emerald-300">

            <button @click="alert('Registration Successful!')" class="w-full emerald-grad text-white py-5 rounded-[20px] font-black shadow-xl mt-4">JOIN LUCIPAY</button>
            
            <button @click="view = 'login'" class="w-full text-center text-sm font-bold text-gray-400 uppercase tracking-widest">Back to Login</button>
        </div>

        <div x-show="view === 'forget'" class="w-full space-y-5">
            <h2 class="text-3xl font-black text-emerald-900">Reset Password</h2>
            <p class="text-gray-500">Enter your registered mobile to get OTP.</p>
            <input type="number" placeholder="Mobile Number" class="input-box">
            <button @click="alert('OTP Sent!')" class="w-full emerald-grad text-white py-5 rounded-[20px] font-black">SEND RESET LINK</button>
            <button @click="view = 'login'" class="w-full text-center text-sm font-bold text-emerald-600 uppercase">Cancel</button>
        </div>

        <div x-show="view === 'dashboard'" class="w-full">
            <div class="emerald-grad p-10 rounded-[3rem] text-white shadow-2xl relative">
                <p class="text-emerald-200 text-xs font-black uppercase tracking-widest">Your Balance</p>
                <h3 class="text-5xl font-black mt-2">₹0.00</h3>
            </div>
            <button @click="view = 'login'" class="mt-10 w-full p-4 bg-white border border-red-100 text-red-500 font-black rounded-2xl">LOGOUT</button>
        </div>

    </div>

    <script>
        function luciApp() {
            return {
                screen: 'splash',
                view: 'login',
                showLogo: false,
                loginPhone: '',
                loginPass: '',
                rememberMe: false,

                init() {
                    // Remember Me check
                    const savedPhone = localStorage.getItem('luci_phone');
                    if (savedPhone) {
                        this.loginPhone = savedPhone;
                        this.rememberMe = true;
                    }

                    setTimeout(() => { 
                        this.showLogo = true;
                        setTimeout(() => { this.screen = 'main' }, 1500);
                    }, 1800);
                },

                sendOTP() {
                    alert('OTP service will be connected to your Telegram Bot/Firebase.');
                },

                doLogin() {
                    // Logic to save data if Remember Me is checked
                    if (this.rememberMe) {
                        localStorage.setItem('luci_phone', this.loginPhone);
                    } else {
                        localStorage.removeItem('luci_phone');
                    }

                    if(this.loginPhone === '1234567890' && this.loginPass === '1234') {
                        this.view = 'dashboard';
                    } else {
                        alert('Error: Check credentials or Register.');
                    }
                }
            }
        }
    </script>
</body>
</html>
