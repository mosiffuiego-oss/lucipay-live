<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* Premium Black & Yellow Logo */
        .lp-logo {
            background: #000000;
            color: #FFD700; /* Gold/Yellow */
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-style: italic;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* Animations */
        .shrink-text {
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slide-up-logo {
            transition: all 0.8s ease-in-out;
            transform: translateY(-120px); /* Logo moves up */
        }

        .fade-in-up {
            animation: fadeInUp 0.8s forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-premium {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            padding: 18px;
            width: 100%;
            transition: 0.3s;
        }
        .input-premium:focus {
            border-color: #10b981;
            background: #fff;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body x-data="luciFlow()" class="bg-white overflow-hidden">

    <div class="relative min-h-screen flex flex-col items-center justify-center p-6">
        
        <div :class="animStage >= 2 ? 'slide-up-logo' : ''" class="z-20 flex flex-col items-center">
            <h1 x-show="animStage === 0" 
                class="text-6xl font-black text-emerald-600 italic tracking-tighter shrink-text">
                LuciPay
            </h1>

            <div x-show="animStage >= 1" 
                 x-transition:enter="transition ease-out duration-500"
                 x-transition:enter-start="opacity-0 scale-50"
                 x-transition:enter-end="opacity-100 scale-100"
                 class="lp-logo w-24 h-24 text-4xl">
                 LP
            </div>
        </div>

        <div x-show="animStage >= 2" x-cloak class="w-full max-w-sm absolute mt-24 space-y-4">
            
            <div class="fade-in-up" style="animation-delay: 0.2s">
                <h2 class="text-2xl font-black text-slate-800 text-center">Welcome Back</h2>
                <p class="text-slate-400 text-center text-sm mb-6">Enter details to continue</p>
            </div>

            <div class="fade-in-up" style="animation-delay: 0.4s">
                <input type="number" placeholder="Mobile Number" class="input-premium" x-model="phone">
            </div>

            <div class="fade-in-up" style="animation-delay: 0.5s">
                <input type="password" placeholder="Password" class="input-premium" x-model="pass">
            </div>

            <div class="flex items-center justify-between px-2 fade-in-up" style="animation-delay: 0.6s">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" class="rounded text-emerald-600">
                    <span class="text-xs font-bold text-slate-500 uppercase">Remember</span>
                </label>
                <span class="text-xs font-bold text-emerald-600 uppercase">Forgot?</span>
            </div>

            <div class="fade-in-up" style="animation-delay: 0.7s">
                <button class="w-full bg-emerald-600 text-white py-5 rounded-[22px] font-black shadow-xl shadow-emerald-100 active:scale-95 transition">
                    SIGN IN
                </button>
            </div>

            <p class="text-center text-xs font-bold text-slate-400 fade-in-up" style="animation-delay: 0.8s">
                New here? <span class="text-emerald-600">Create Account</span>
            </p>
        </div>
    </div>

    <script>
        function luciFlow() {
            return {
                animStage: 0,
                phone: '',
                pass: '',
                init() {
                    // Start Sequence
                    setTimeout(() => {
                        this.animStage = 1; // Show LP Logo
                        setTimeout(() => {
                            this.animStage = 2; // Slide Up & Show Form
                        }, 1000);
                    }, 1500);
                }
            }
        }
    </script>
</body>
</html>
