<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Premium - Elite Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* Premium Logo Style */
        .lp-logo-circle {
            background: #000; color: #FFD700; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 50%; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            font-size: 2.2rem; border: 4px solid #FFD700; margin: 0 auto;
        }

        .btn-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.3);
        }

        .input-style {
            background: #f1f5f9; border: 2px solid transparent; border-radius: 20px;
            padding: 16px 20px; width: 100%; font-weight: 600; transition: 0.3s;
        }
        .input-style:focus { border-color: #10b981; background: #fff; outline: none; }
        
        /* Dark Theme Background */
        body.is-dashboard {
            background-color: #f3f4f6;
        }

        /* Bottom Nav Glass Effect */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.95); }
            70% { transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }
        .anim-bounce { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body x-data="luciApp()" :class="view === 'dashboard' ? 'is-dashboard font-sans text-slate-900' : 'bg-white font-sans text-slate-900'">

    <div x-show="step === 'splash'" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
        <h1 x-show="!showLogo" x-transition.opacity.duration.500ms class="text-6xl font-black text-emerald-600 italic tracking-tighter">LuciPay</h1>
        <div x-show="showLogo" x-transition:enter="transition ease-out duration-700" x-transition:enter-start="scale-0 rotate-180" x-transition:enter-end="scale-100 rotate-0" class="lp-logo-circle">LP</div>
    </div>

    <div x-show="step !== 'splash'" x-cloak class="min-h-screen flex flex-col items-center p-8 pb-32">
        
        <div x-show="view !== 'dashboard'" class="mt-2 mb-10 lp-logo-circle scale-75 animate-up">LP</div>

        <div x-show="view === 'login'" class="w-full max-w-sm space-y-7 anim-bounce">
            <div class="text-center">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Login LuciPay User</h2>
                <p class="text-slate-400 font-bold text-sm mt-2">Enter credentials to proceed</p>
            </div>

            <div class="space-y-4">
                <input type="number" placeholder="Phone Number" class="input-style" x-model="loginPhone">
                <input type="password" placeholder="Password" class="input-style" x-model="loginPass">
            </div>

            <div class="flex items-center justify-between px-2">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" x-model="rememberMe" class="w-5 h-5 text-emerald-600 rounded">
                    <span class="text-sm font-bold text-slate-500">Remember Me</span>
                </label>
                <button @click="view = 'forget'" class="text-sm font-black text-emerald-600">Forgot Password?</button>
            </div>

            <button @click="handleLogin()" class="w-full btn-green text-white py-5 rounded-[22px] font-black text-lg shadow-xl uppercase tracking-widest active:scale-95 transition-all">
                Login
            </button>

            <p class="text-center font-bold text-slate-400">
                New User? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer underline">Register</span>
            </p>
        </div>

        <div x-show="view === 'dashboard'" class="w-full max-w-md anim-bounce space-y-6">
            
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-3">
                    <div class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center p-1 border-2 border-white shadow-inner">
                        <img src="https://img.icons8.com/fluency/96/female-user-profile.png" alt="User Avatar" class="w-full h-full rounded-full">
                    </div>
                    <div>
                        <h4 class="text-2xl font-black tracking-tight" x-text="loginPhone === '1234567890' ? 'Admin Luci' : loginPhone"></h4>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[11px] font-bold text-slate-500 bg-white px-2.5 py-1 rounded-full shadow-sm" x-text="'ID: ' + uid"></span>
                            <button @click="view = 'login'" class="text-[10px] font-bold text-red-500 uppercase">Exit</button>
                        </div>
                    </div>
                </div>
                <button class="text-slate-500 hover:text-emerald-600">
                    <img src="https://img.icons8.com/material-rounded/24/null/ringing-bell.png" class="w-6 h-6"/>
                </button>
            </div>

            <div class="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden border-b-8 border-emerald-500">
                <p class="text-emerald-400 text-xs font-black uppercase tracking-widest">Available Balance</p>
                <h3 class="text-5xl font-black mt-4 italic">₹0.00</h3>
                <button class="absolute right-6 top-1/2 -translate-y-1/2 bg-white text-slate-900 font-bold px-6 py-2.5 rounded-full text-xs shadow-lg">Detail</button>
                <div class="absolute -right-6 -top-6 w-24 h-24 bg-emerald-600 rounded-full blur-3xl opacity-20 z-0"></div>
            </div>

            <div class="bg-slate-800 p-6 rounded-3xl text-white shadow-lg grid grid-cols-2 divide-x divide-slate-600">
                <div class="flex items-center gap-4 px-2">
                    <img src="https://img.icons8.com/material-rounded/24/null/up--v1.png" class="w-6 h-6 text-emerald-400"/>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Deposit</p>
                        <p class="text-xl font-black tracking-tight mt-1">₹0.00</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 px-2 pl-6">
                    <img src="https://img.icons8.com/material-rounded/24/null/down--v1.png" class="w-6 h-6 text-red-400"/>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Withdraw</p>
                        <p class="text-xl font-black tracking-tight mt-1">₹0.00</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-4 px-1">
                <template x-for="item in [{img: 'https://img.icons8.com/fluency/96/money-transfer.png', name: 'Deposit'}, {img: 'https://img.icons8.com/fluency/96/check-list.png', name: 'Task'}, {img: 'https://img.icons8.com/fluency/96/user-group-man-man.png', name: 'Team'}, {img: 'https://img.icons8.com/fluency/96/receipt.png', name: 'Order'}]">
                    <div class="text-center space-y-3">
                        <div class="bg-white p-5 rounded-3xl shadow-md border border-slate-100 flex items-center justify-center">
                            <img :src="item.img" class="w-full h-full object-contain" :alt="item.name"/>
                        </div>
                        <p class="text-xs font-bold text-slate-600 uppercase tracking-tighter" x-text="item.name"></p>
                    </div>
                </template>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 anim-bounce" style="animation-delay: 0.1s">
                <div class="flex items-center justify-between mb-8">
                    <h5 class="text-lg font-black tracking-tight">Transactions</h5>
                    <button class="text-emerald-600 font-bold text-xs uppercase underline">See All</button>
                </div>
                
                <div class="text-center py-12 px-4 space-y-5">
                    <img src="https://img.icons8.com/fluency/96/receipt.png" class="w-16 h-16 mx-auto opacity-30"/>
                    <div>
                        <p class="text-sm font-black text-slate-900">No top-up orders yet</p>
                        <p class="text-[11px] font-bold text-slate-400 mt-1">Top up now and start the game!</p>
                    </div>
                    <button class="bg-emerald-600 text-white font-black px-10 py-3.5 rounded-full text-xs uppercase tracking-wider active:scale-95 transition-all shadow-lg shadow-emerald-200">
                        Top up now
                    </button>
                </div>
            </div>

            <div class="pt-10 px-2 anim-bounce" style="animation-delay: 0.2s">
                <button @click="view = 'login'" class="w-full p-5 bg-red-50 text-red-600 font-black rounded-3xl border-2 border-red-100">SECURE LOGOUT</button>
            </div>
            
            <nav x-show="view === 'dashboard'" x-cloak class="fixed bottom-0 left-0 right-0 p-4 bottom-nav flex justify-around items-center rounded-t-[30px] shadow-2xl z-40 border-t border-slate-100">
                <template x-for="item in [{icon: 'https://img.icons8.com/fluency-systems-filled/48/emerald/home.png', name: 'Home'}, {icon: 'https://img.icons8.com/fluency-systems-filled/48/slate/credit-card.png', name: 'Payment'}, {icon: 'https://img.icons8.com/fluency-systems-filled/48/slate/wallet.png', name: 'Wallet'}, {icon: 'https://img.icons8.com/fluency-systems-filled/48/slate/statistics.png', name: 'Statistics'}, {icon: 'https://img.icons8.com/fluency-systems-filled/48/slate/gender-neutral-user.png', name: 'My'}]">
                    <button class="flex flex-col items-center gap-1.5 p-1">
                        <img :src="item.icon" class="w-6 h-6"/>
                        <span class="text-[10px] font-black uppercase tracking-tighter" :class="item.name === 'Home' ? 'text-emerald-700' : 'text-slate-500'" x-text="item.name"></span>
                    </button>
                </template>
            </nav>
        </div>

    </div>

    <script>
        function luciApp() {
            return {
                step: 'splash',
                view: 'login',
                showLogo: false,
                rememberMe: false,
                loginPhone: '',
                loginPass: '',
                uid: '10001', // Default, fixed UID Simulation

                init() {
                    setTimeout(() => {
                        this.showLogo = true;
                        setTimeout(() => { this.step = 'app' }, 1200);
                    }, 1400);

                    const saved = localStorage.getItem('l_u');
                    if(saved) { this.loginPhone = saved; this.rememberMe = true; }
                },

                handleLogin() {
                    if(this.loginPhone.length >= 10 && this.loginPass.length >= 4) {
                        if(this.rememberMe) localStorage.setItem('l_u', this.loginPhone);
                        else localStorage.removeItem('l_u');
                        
                        // Simulation UID generation for each new user login
                        this.uid = Math.floor(10000 + Math.random() * 90000); 
                        
                        this.view = 'dashboard';
                    } else {
                        alert("Try again! Test Phone: 1234567890 | Pass: 1234");
                    }
                }
            }
        }
    </script>
</body>
</html>
