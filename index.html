<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucipay</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.logo-anim {
  font-size: 60px;
  color: #06b6d4;
  animation: zoom 1.2s infinite alternate;
}
@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* Main */
.container {
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

.logo {
  text-align: center;
  font-size: 40px;
  color: #06b6d4;
  margin: 10px 0;
}

.input-box {
  background: #1e293b;
  border-radius: 12px;
  padding: 12px;
  margin: 10px 0;
}

.input-box input {
  width: 100%;
  border: none;
  background: none;
  color: white;
  outline: none;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: #06b6d4;
  color: white;
  font-size: 16px;
}

.link {
  text-align: center;
  color: #06b6d4;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
  <div class="logo-anim">LP</div>
</div>

<div class="container">

<div class="logo">Lucipay</div>

<!-- LOGIN -->
<div id="login">
  <div class="input-box">
    <input type="text" id="phone" placeholder="Phone Number">
  </div>

  <div class="input-box">
    <input type="password" id="password" placeholder="Password">
  </div>

  <button onclick="login()">Sign In</button>

  <div class="link" onclick="showRegister()">Register</div>
</div>

<!-- REGISTER -->
<div id="register" style="display:none;">
  <div class="input-box">
    <input type="text" id="rphone" placeholder="Phone Number">
  </div>

  <div class="input-box">
    <input type="password" id="rpass" placeholder="Password">
  </div>

  <button onclick="register()">Sign Up</button>

  <div class="link" onclick="showLogin()">Back</div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PUT_YOUR_KEY",
  authDomain: "PUT_YOUR_DOMAIN",
  projectId: "PUT_YOUR_ID",
};

firebase.initializeApp(firebaseConfig);

// Splash
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},2000);

// Switch
function showRegister(){
  login.style.display="none";
  register.style.display="block";
}
function showLogin(){
  login.style.display="block";
  register.style.display="none";
}

// Register
function register(){
  let phone = document.getElementById("rphone").value;
  let pass = document.getElementById("rpass").value;

  firebase.auth().createUserWithEmailAndPassword(phone+"@app.com", pass)
  .then(()=>alert("Registered"))
  .catch(err=>alert(err.message));
}

// Login
function login(){
  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(phone+"@app.com", pass)
  .then(()=>alert("Login Success"))
  .catch(err=>alert(err.message));
}
</script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz3fgsgoS1O3gEs_T8-NK9Ej4o-hkxvEo",
  authDomain: "lucipay-4f05c.firebaseapp.com",
  projectId: "lucipay-4f05c",
};

firebase.initializeApp(firebaseConfig);
</script>
</body>
</html>
