<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* Bottom Navigation Fix */
        .nav-lock {
            position: fixed !important;
            bottom: 0 !important;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #f1f5f9;
            z-index: 9999;
            padding-bottom: env(safe-area-inset-bottom);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 75px;
        }

        .dashboard-container {
            padding-bottom: 100px; /* Space for nav */
        }

        .lp-logo-circle {
            background: #000; color: #FFD700; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 50%; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            font-size: 2.2rem; border: 4px solid #FFD700; margin: 0 auto;
        }

        .btn-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body x-data="luciApp()" class="bg-gray-50">

    <div x-show="step === 'splash'" class="fixed inset-0 z-[10000] bg-white flex items-center justify-center">
        <h1 x-show="!showLogo" x-transition.duration.500ms class="text-6xl font-black text-emerald-600 italic tracking-tighter">LuciPay</h1>
        <div x-show="showLogo" x-transition:enter="transition duration-700" x-transition:enter-start="scale-0 rotate-180" x-transition:enter-end="scale-100 rotate-0" class="lp-logo-circle">LP</div>
    </div>

    <div x-show="step !== 'splash'" x-cloak class="min-h-screen flex flex-col items-center p-6" :class="view === 'dashboard' ? 'dashboard-container' : ''">
        
        <div x-show="view !== 'dashboard'" class="mt-2 mb-10 lp-logo-circle scale-75">LP</div>

        <div x-show="view === 'login'" class="w-full max-w-sm space-y-7">
            <h2 class="text-3xl font-black text-slate-900 text-center">Login LuciPay User</h2>
            <div class="space-y-4">
                <input type="number" placeholder="Phone Number" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-5 outline-none font-semibold" x-model="loginPhone">
                <input type="password" placeholder="Password" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-5 outline-none font-semibold" x-model="loginPass">
            </div>
            <button @click="handleLogin()" class="w-full btn-green text-white py-5 rounded-[22px] font-black text-lg uppercase tracking-widest">Login</button>
            <p class="text-center font-bold text-slate-400">New User? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer underline">Register</span></p>
        </div>

        <div x-show="view === 'register'" class="w-full max-w-sm space-y-4">
            <h2 class="text-3xl font-black text-center mb-2">Register</h2>
            <input type="text" placeholder="Username" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none font-semibold">
            <div class="flex gap-2">
                <span class="bg-slate-100 flex items-center px-4 rounded-2xl font-bold">+91</span>
                <input type="number" placeholder="Mobile Number" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none font-semibold">
            </div>
            <div class="flex gap-2">
                <input type="number" placeholder="OTP" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none font-semibold">
                <button @click="alert('OTP Sent!')" class="bg-slate-900 text-white px-5 rounded-2xl font-bold text-xs uppercase">Send</button>
            </div>
            <input type="password" placeholder="Password" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none font-semibold">
            <input type="text" placeholder="Invite Code" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-4 outline-none border-dashed border-emerald-300 font-semibold">
            <button @click="view = 'login'" class="w-full btn-green text-white py-5 rounded-[22px] font-black uppercase">Register</button>
        </div>

        <div x-show="view === 'dashboard'" class="w-full max-w-md space-y-6">
            
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-3">
                    <img src="https://img.icons8.com/fluency/96/female-user-profile.png" class="w-14 h-14 bg-white rounded-full shadow-sm p-1">
                    <div>
                        <h4 class="text-xl font-black tracking-tight" x-text="loginPhone"></h4>
                        <span class="text-[11px] font-bold text-slate-500 bg-white px-3 py-1 rounded-full" x-text="'ID: ' + uid"></span>
                    </div>
                </div>
                <img src="https://img.icons8.com/fluency-systems-filled/48/22c55e/appointment-reminders.png" class="w-6 h-6"/>
            </div>

            <div class="bg-slate-900 p-8 rounded-[2.8rem] text-white shadow-2xl relative overflow-hidden border-b-8 border-emerald-500">
                <p class="text-emerald-400 text-xs font-black tracking-widest uppercase">Available Balance</p>
                <h3 class="text-5xl font-black mt-3 italic">₹0.00</h3>
                <button class="absolute right-6 top-1/2 -translate-y-1/2 bg-white text-black font-bold px-5 py-2 rounded-full text-[10px] uppercase">Detail</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-3xl shadow-sm flex items-center gap-3">
                    <img src="https://img.icons8.com/fluency/48/safe-out.png" class="w-8 h-8"/>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase">Deposit</p><p class="text-lg font-black text-slate-800">₹0</p></div>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm flex items-center gap-3">
                    <img src="https://img.icons8.com/fluency/48/safe-in.png" class="w-8 h-8"/>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase">Withdraw</p><p class="text-lg font-black text-slate-800">₹0</p></div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-4 px-1">
                <template x-for="item in [{i: 'bank-card-backside', n: 'Deposit'}, {i: 'todo-list', n: 'Task'}, {i: 'user-group-man-man', n: 'Team'}, {i: 'bill', n: 'Order'}]">
                    <div class="text-center space-y-2">
                        <div class="bg-white aspect-square rounded-2xl shadow-sm flex items-center justify-center p-3">
                            <img :src="'https://img.icons8.com/fluency/96/' + item.i + '.png'" class="w-full">
                        </div>
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-tighter" x-text="item.n"></p>
                    </div>
                </template>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm text-center space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-black text-slate-800">Transactions</span>
                    <span class="text-emerald-600 text-[10px] font-bold underline">See All</span>
                </div>
                <img src="https://img.icons8.com/fluency/96/nothing-found.png" class="w-16 h-16 mx-auto opacity-30">
                <p class="text-sm font-black text-slate-400">No top-up orders yet</p>
                <button class="bg-emerald-600 text-white font-black px-10 py-3.5 rounded-full text-xs uppercase shadow-lg shadow-emerald-100">Top up now</button>
            </div>
        </div>

        <nav x-show="view === 'dashboard'" class="nav-lock">
            <template x-for="item in [{ic: 'home', n: 'Home', a: true}, {ic: 'payment-history', n: 'Payment'}, {ic: 'wallet', n: 'Wallet'}, {ic: 'combo-chart', n: 'Stats'}, {ic: 'user-female-circle', n: 'My'}]">
                <button class="flex flex-col items-center gap-1">
                    <img :src="'https://img.icons8.com/fluency/48/null/' + item.ic + '.png'" class="w-6 h-6" :class="!item.a ? 'grayscale opacity-50' : ''">
                    <span class="text-[9px] font-black uppercase tracking-tighter" :class="item.a ? 'text-emerald-600' : 'text-slate-400'" x-text="item.n"></span>
                </button>
            </template>
        </nav>

    </div>

    <script>
        function luciApp() {
            return {
                step: 'splash',
                view: 'login',
                showLogo: false,
                loginPhone: '',
                loginPass: '',
                uid: '99999',
                init() {
                    setTimeout(() => {
                        this.showLogo = true;
                        setTimeout(() => { this.step = 'app' }, 1200);
                    }, 1400);
                },
                handleLogin() {
                    if(this.loginPhone.length >= 10 && this.loginPass.length >= 4) {
                        this.uid = Math.floor(10000 + Math.random() * 90000);
                        this.view = 'dashboard';
                    } else {
                        alert("Details correctly bhariye!");
                    }
                }
            }
        }
    </script>
</body>
</html>
