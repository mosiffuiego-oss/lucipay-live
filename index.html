<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luci Payment</title>

<style>
body{margin:0;background:#0b0f14;color:white;font-family:Arial}

/* Splash */
#splash{
position:fixed;width:100%;height:100%;background:black;
display:flex;flex-direction:column;justify-content:center;align-items:center;
z-index:999;overflow:hidden;
}
#title{font-size:40px;animation:glow 1.5s infinite alternate}
#lpLogo{
width:80px;height:80px;border-radius:50%;border:2px solid white;
display:flex;align-items:center;justify-content:center;margin-top:20px;
}
@keyframes glow{
from{text-shadow:0 0 5px red}
to{text-shadow:0 0 20px blue}
}

/* Logo */
.logo{text-align:center;margin-top:60px}
.circle{
width:80px;height:80px;border-radius:50%;
background:#16a34a;display:flex;align-items:center;justify-content:center;
margin:auto;font-size:30px;
}

/* Inputs */
.container{width:90%;max-width:400px;margin:auto}
input{
width:100%;padding:14px;margin:10px 0;border-radius:25px;
border:none;background:#11161d;color:white;
}

button{
width:100%;padding:14px;border:none;border-radius:25px;
background:#16a34a;color:white;font-size:16px;
}

.row{
display:flex;justify-content:space-between;color:#16a34a;font-size:14px;
}

/* Animation */
#profileBox{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;transition:1s;
}
#profilePic{
width:80px;height:80px;border-radius:50%;
background:#16a34a;display:flex;align-items:center;justify-content:center;
font-size:35px;margin:auto;
}
.moveTop{top:20px!important;left:20px!important;transform:none!important}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">
<h1 id="title">Lucipay</h1>
<div id="lpLogo">LP</div>
</div>

<!-- LOGIN -->
<div id="login">
<div class="logo">
<div class="circle">LP</div>
<h2>Lucipay</h2>
</div>

<div class="container">
<input id="phone" placeholder="Number">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="row">
<span onclick="showRegister()">Register</span>
<span>Remember Me</span>
<span onclick="showForgot()">Forget</span>
</div>
</div>
</div>

<!-- REGISTER -->
<div id="register" style="display:none">
<div class="container">
<input id="username" placeholder="Username">
<input id="rpass" placeholder="Password">
<input id="rphone" placeholder="Phone">

<input id="otp" placeholder="OTP">
<button onclick="sendOTP()">Send OTP</button>

<input id="invite" placeholder="Invite Code">

<button onclick="verifyOTP()">Register</button>
<button onclick="showLogin()">Back</button>
</div>
</div>

<!-- FORGOT -->
<div id="forgot" style="display:none">
<div class="container">
<input id="fphone" placeholder="Phone">
<input id="fotp" placeholder="OTP">
<button onclick="sendForgotOTP()">Send OTP</button>

<input id="newpass" placeholder="New Password">
<button onclick="resetPassword()">Change Password</button>
</div>
</div>

<!-- ANIMATION -->
<div id="welcomeAnim" style="display:none">
<div id="profileBox">
<div id="profilePic">👤</div>
<h2 id="wname"></h2>
<p id="wuid"></p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;padding:20px">
<div style="position:absolute;top:20px;left:20px">
<div class="circle">LP</div>
<p id="dname"></p>
<small id="duid"></small>
</div>

<h2 style="margin-top:120px">Balance ₹<span id="balance">0</span></h2>
<button onclick="earn()">Earn ₹10</button>
<button onclick="logout()">Logout</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
databaseURL:"YOUR_DB_URL",
projectId:"YOUR_ID"
});

// Splash hide
setTimeout(()=>{splash.style.display="none"},2500);

// Page switch
function showRegister(){login.style.display="none";register.style.display="block"}
function showLogin(){register.style.display="none";login.style.display="block";forgot.style.display="none"}
function showForgot(){login.style.display="none";forgot.style.display="block"}

// OTP
function sendOTP(){
let phone=rphone.value;
window.recaptchaVerifier=new firebase.auth.RecaptchaVerifier('splash');
firebase.auth().signInWithPhoneNumber("+91"+phone,window.recaptchaVerifier)
.then(res=>{confirmationResult=res;alert("OTP sent")});
}

// Register
function verifyOTP(){
confirmationResult.confirm(otp.value).then(()=>{
let uid=Math.floor(10000+Math.random()*90000);

firebase.database().ref("users/"+uid).set({
username:username.value,
phone:rphone.value,
password:rpass.value,
uid:uid,
balance:0
});

alert("Registered");
showLogin();
});
}

// Login
function login(){
firebase.database().ref("users").once("value",snap=>{
snap.forEach(d=>{
let u=d.val();
if(u.phone==phone.value && u.password==password.value){

login.style.display="none";
welcomeAnim.style.display="block";

wname.innerText=u.username;
wuid.innerText="UID: "+u.uid;

profilePic.innerText = u.username.toLowerCase().includes("girl") ? "👩" : "👨";

window.currentUID=u.uid;

setTimeout(()=>{profileBox.classList.add("moveTop")},1000);

setTimeout(()=>{
welcomeAnim.style.display="none";
dashboard.style.display="block";
dname.innerText=u.username;
duid.innerText="UID:"+u.uid;
balance.innerText=u.balance;
},2500);

}
});
});
}

// Earn
function earn(){
let ref=firebase.database().ref("users/"+currentUID);
ref.once("value").then(snap=>{
let data=snap.val();
let newBal=data.balance+10;
ref.update({balance:newBal});
balance.innerText=newBal;
});
}

// Forgot
function sendForgotOTP(){
alert("Use same OTP system");
}
function resetPassword(){
firebase.database().ref("users").once("value",snap=>{
snap.forEach(d=>{
let u=d.val();
if(u.phone==fphone.value){
firebase.database().ref("users/"+u.uid).update({
password:newpass.value
});
alert("Password Changed");
}
});
});
}

function logout(){location.reload()}
</script>

</body>
</html>
