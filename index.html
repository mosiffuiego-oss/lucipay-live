<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* Premium Black Circle & Yellow LP */
        .lp-logo {
            background: #000000;
            color: #FFD700;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-style: italic;
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
            font-size: 2.2rem;
            border: 3px solid #FFD700;
            margin: 0 auto;
        }

        .btn-premium {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.3);
            border: none;
            transition: all 0.3s ease;
        }
        .btn-premium:active { transform: scale(0.96); }

        .input-box {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 18px 24px;
            width: 100%;
            transition: 0.3s;
            font-weight: 600;
        }
        .input-box:focus {
            border-color: #10b981;
            background: #ffffff;
            outline: none;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-up { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>
<body x-data="luciApp()" class="bg-white overflow-x-hidden font-sans">

    <div x-show="step === 'splash'" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
        <h1 x-show="!showLogo" x-transition.opacity.duration.400ms class="text-6xl font-black text-emerald-600 italic tracking-tighter">LuciPay</h1>
        <div x-show="showLogo" x-transition:enter="transition ease-out duration-700" x-transition:enter-start="scale-0 rotate-45" x-transition:enter-end="scale-100 rotate-0" class="lp-logo">LP</div>
    </div>

    <div x-show="step !== 'splash'" x-cloak class="min-h-screen flex flex-col items-center p-8">
        
        <div class="mt-2 mb-10 lp-logo scale-90 anim-up">LP</div>

        <div x-show="view === 'login'" class="w-full max-w-sm space-y-6 anim-up">
            <div class="text-center">
                <h2 class="text-3xl font-black text-slate-900">Login LuciPay User</h2>
                <p class="text-slate-400 font-bold text-sm mt-1">Access your secure wallet</p>
            </div>

            <div class="space-y-4">
                <input type="number" placeholder="Phone Number" class="input-box" x-model="phone">
                <input type="password" placeholder="Password" class="input-box" x-model="pass">
            </div>

            <div class="flex items-center justify-between px-2">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" x-model="remember" class="w-5 h-5 text-emerald-600 rounded-lg">
                    <span class="text-sm font-bold text-slate-500">Remember Me</span>
                </label>
                <button class="text-sm font-black text-emerald-600">Forgot?</button>
            </div>

            <button @click="handleLogin()" class="w-full btn-premium text-white py-5 rounded-[24px] font-black text-lg tracking-widest uppercase">
                Secure Login
            </button>

            <p class="text-center font-bold text-slate-400">
                New User? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer underline">Register</span>
            </p>
        </div>

        <div x-show="view === 'dashboard'" class="w-full max-w-sm anim-up">
            <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl">
                <p class="text-emerald-400 text-xs font-black uppercase tracking-widest">Main Wallet</p>
                <h3 class="text-5xl font-black mt-3 italic">₹0.00</h3>
            </div>
            <button @click="view = 'login'" class="mt-12 w-full p-5 bg-red-50 text-red-600 font-black rounded-[24px] border-2 border-red-100">LOGOUT</button>
        </div>
    </div>

    <script>
        function luciApp() {
            return {
                step: 'splash',
                view: 'login',
                showLogo: false,
                phone: '',
                pass: '',
                remember: false,

                init() {
                    // Animation Timer
                    setTimeout(() => {
                        this.showLogo = true;
                        setTimeout(() => { this.step = 'app' }, 1200);
                    }, 1500);

                    // Auto-load remember data
                    const saved = localStorage.getItem('l_p');
                    if(saved) { this.phone = saved; this.remember = true; }
                },

                handleLogin() {
                    if(this.phone.length >= 10 && this.pass.length >= 4) {
                        if(this.remember) localStorage.setItem('l_p', this.phone);
                        else localStorage.removeItem('l_p');
                        this.view = 'dashboard';
                    } else {
                        alert("Please enter 10-digit Phone & 4-digit Password.");
                    }
                }
            }
        }
    </script>
</body>
</html>
