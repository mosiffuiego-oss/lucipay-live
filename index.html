<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LuciPay Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .green-card { background: linear-gradient(180deg, #10b981 0%, #059669 100%); border-radius: 20px; }
        .nav-circle { width: 62px; height: 62px; background: #059669; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin-top: -32px; border: 5px solid white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="bg-slate-50 font-sans" x-data="{ 
    isLoggedIn: false, 
    page: 'home',
    phone: '',
    pass: '',
    inviteCode: 'Wp3MFO',
    login() {
        if(this.phone === '1234567890' && this.pass === '1234') {
            this.isLoggedIn = true;
        } else {
            alert('Wrong Details! Use Phone: 1234567890, Pass: 1234');
        }
    }
}">

    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex flex-col items-center justify-center p-6 bg-white">
            <div class="w-16 h-16 green-card flex items-center justify-center text-white font-bold italic text-xl mb-6">LP</div>
            <h2 class="text-2xl font-black text-emerald-900 mb-2 italic">LolipopPay</h2>
            <p class="text-gray-400 text-sm mb-10 uppercase tracking-widest font-bold">Member Login</p>
            
            <div class="w-full max-w-sm space-y-4">
                <input type="number" placeholder="Phone Number" x-model="phone">
                <input type="password" placeholder="Password" x-model="pass">
                <button @click="login()" class="w-full green-card py-4 text-white font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                    Sign In
                </button>
            </div>
            <p class="mt-8 text-xs text-gray-400">Default Login: 1234567890 / 1234</p>
        </div>
    </template>

    <template x-if="isLoggedIn">
        <div class="pb-24">
            <header class="bg-white p-4 flex justify-between items-center border-b sticky top-0 z-50">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 green-card flex items-center justify-center text-white font-bold italic text-[10px]">LP</div>
                    <p class="text-[11px] font-bold text-emerald-900 uppercase">Merchant</p>
                </div>
                <i class="fa-solid fa-headset text-gray-400 text-lg"></i>
            </header>

            <main x-show="page === 'home'" class="p-4" x-cloak>
                <div class="green-card p-8 text-white shadow-lg mb-6 text-center">
                    <p class="text-[10px] opacity-80 uppercase tracking-widest mb-1 font-bold">Available Balance</p>
                    <h1 class="text-4xl font-black italic">₹ 0.00</h1>
                </div>
                
                <div class="grid grid-cols-4 gap-3">
                    <div @click="page = 'team'" class="bg-white p-3 rounded-2xl flex flex-col items-center gap-1 shadow-sm border border-emerald-50">
                        <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-users"></i></div>
                        <p class="text-[8px] font-bold uppercase">Team</p>
                    </div>
                    <div class="bg-white p-3 rounded-2xl flex flex-col items-center gap-1 shadow-sm border border-emerald-50 opacity-50">
                        <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-wallet"></i></div>
                        <p class="text-[8px] font-bold uppercase">Recharge</p>
                    </div>
                    <div class="bg-white p-3 rounded-2xl flex flex-col items-center gap-1 shadow-sm border border-emerald-50 opacity-50">
                        <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-money-bill-transfer"></i></div>
                        <p class="text-[8px] font-bold uppercase">Withdraw</p>
                    </div>
                    <div class="bg-white p-3 rounded-2xl flex flex-col items-center gap-1 shadow-sm border border-emerald-50 opacity-50">
                        <div class="w-10 h-10 bg-yellow-50 text-yellow-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-gift"></i></div>
                        <p class="text-[8px] font-bold uppercase">Bonus</p>
                    </div>
                </div>
            </main>

            <main x-show="page === 'team'" class="p-4" x-cloak>
                <div class="flex items-center mb-4">
                    <i @click="page = 'home'" class="fa-solid fa-arrow-left text-emerald-700 text-lg"></i>
                    <h2 class="flex-1 text-center font-bold text-emerald-800 text-lg">Team Report</h2>
                </div>

                <div class="green-card p-6 text-white shadow-lg mb-6">
                    <p class="text-center text-[10px] uppercase opacity-90 font-bold tracking-wide">My Total Commissions</p>
                    <h1 class="text-center text-3xl font-bold my-4 tracking-tight">+1786.45</h1>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white/20 p-2 rounded-xl text-center"><p class="text-[8px] uppercase">Yesterday</p><p class="text-xs font-bold">+54.00</p></div>
                        <div class="bg-white/20 p-2 rounded-xl text-center"><p class="text-[8px] uppercase">Members</p><p class="text-xs font-bold">40</p></div>
                        <div class="bg-white/20 p-2 rounded-xl text-center"><p class="text-[8px] uppercase">Today</p><p class="text-xs font-bold">+5.00</p></div>
                        <div class="bg-white/20 p-2 rounded-xl text-center"><p class="text-[8px] uppercase">Total Deposit</p><p class="text-xs font-bold">85050.00</p></div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-50 mb-6">
                    <div class="bg-emerald-600 text-white p-4 rounded-xl flex justify-between items-center">
                        <span class="font-bold text-sm">Link</span>
                        <div class="flex items-center gap-2"><span class="font-mono text-sm" x-text="inviteCode"></span><i class="fa-regular fa-copy opacity-80"></i></div>
                    </div>
                </div>
            </main>

            <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around items-center z-50">
                <button @click="page = 'home'" :class="page === 'home' ? 'text-emerald-600' : 'text-gray-300'" class="flex flex-col items-center gap-1">
                    <i class="fa-solid fa-house"></i><span class="text-[8px] font-bold">HOME</span>
                </button>
                <button class="text-gray-300 flex flex-col items-center gap-1"><i class="fa-solid fa-file-invoice"></i><span class="text-[8px] font-bold uppercase">Order</span></button>
                <button @click="page = 'home'" class="flex flex-col items-center"><div class="nav-circle shadow-emerald-200"><i class="fa-solid fa-wallet text-xl"></i></div></button>
                <button @click="page = 'team'" :class="page === 'team' ? 'text-emerald-600' : 'text-gray-300'" class="flex flex-col items-center gap-1">
                    <i class="fa-solid fa-users"></i><span class="text-[8px] font-bold">TEAM</span>
                </button>
                <button class="text-gray-300 flex flex-col items-center gap-1"><i class="fa-solid fa-user"></i><span class="text-[8px] font-bold uppercase">MY</span></button>
            </nav>
        </div>
    </template>

</body>
</html>
