<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Pro - Multi Device</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .lp-logo {
            background: #000; color: #FFD700; width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 50%; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            font-size: 2.2rem; border: 4px solid #FFD700; margin: 0 auto;
        }
        .btn-premium {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 12px 25px rgba(16, 185, 129, 0.4);
        }
        .input-style {
            background: #f1f5f9; border: 2px solid transparent; border-radius: 20px;
            padding: 16px 20px; width: 100%; font-weight: 600; transition: 0.3s;
        }
        .input-style:focus { border-color: #10b981; background: #fff; outline: none; }
        
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            70% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .anim-bounce { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body x-data="luciApp()" class="bg-white font-sans">

    <div x-show="step === 'splash'" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
        <h1 x-show="!showLogo" x-transition.duration.500ms class="text-6xl font-black text-emerald-600 italic tracking-tighter">LuciPay</h1>
        <div x-show="showLogo" x-transition:enter="transition duration-700 transform" x-transition:enter-start="scale-0 rotate-90" x-transition:enter-end="scale-100 rotate-0" class="lp-logo">LP</div>
    </div>

    <div x-show="step !== 'splash'" x-cloak class="min-h-screen flex flex-col items-center p-8">
        
        <div class="mt-4 mb-8 lp-logo scale-75 anim-bounce">LP</div>

        <div x-show="view === 'login'" class="w-full max-w-sm space-y-6 anim-bounce">
            <div class="text-center">
                <h2 class="text-3xl font-black text-slate-900">Login LuciPay User</h2>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-1">Global Access Enabled</p>
            </div>

            <div class="space-y-4">
                <input type="number" placeholder="Enter Mobile Number" class="input-style" x-model="loginData.phone">
                <input type="password" placeholder="Password" class="input-box input-style" x-model="loginData.pass">
            </div>

            <div class="flex items-center justify-between px-1">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" x-model="rememberMe" class="w-5 h-5 text-emerald-600 rounded">
                    <span class="text-sm font-bold text-slate-500 tracking-tight">Save Credentials</span>
                </label>
                <button class="text-sm font-black text-emerald-600">Need Help?</button>
            </div>

            <button @click="handleLogin()" class="w-full btn-premium text-white py-5 rounded-[24px] font-black text-lg tracking-wider uppercase active:scale-95 transition-all">
                Authorize Login
            </button>

            <p class="text-center font-bold text-slate-400">
                New to LuciPay? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer underline">Create Global ID</span>
            </p>
        </div>

        <div x-show="view === 'register'" class="w-full max-w-sm space-y-5 anim-bounce">
            <h2 class="text-3xl font-black text-slate-900 text-center">Register Account</h2>
            <input type="text" placeholder="Full Name" class="input-style" x-model="regData.name">
            <input type="number" placeholder="Phone Number" class="input-style" x-model="regData.phone">
            <input type="password" placeholder="Create Password" class="input-style" x-model="regData.pass">
            
            <button @click="handleRegister()" class="w-full btn-premium text-white py-5 rounded-[24px] font-black uppercase tracking-widest">
                Register & Sync
            </button>
            <button @click="view = 'login'" class="w-full text-center font-bold text-slate-400 text-xs">Back to Login</button>
        </div>

        <div x-show="view === 'dashboard'" class="w-full max-w-sm anim-bounce text-center">
            <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl border-b-8 border-emerald-500">
                <p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.3em]">Cloud Wallet Balance</p>
                <h3 class="text-5xl font-black mt-4">₹0.00</h3>
            </div>
            <p class="mt-6 text-slate-400 font-bold">Logged in as: <span class="text-emerald-600" x-text="loginData.phone"></span></p>
            <button @click="view = 'login'" class="mt-8 w-full p-5 bg-red-50 text-red-600 font-black rounded-[24px]">SECURE LOGOUT</button>
        </div>

    </div>

    <script>
        function luciApp() {
            return {
                step: 'splash',
                view: 'login',
                showLogo: false,
                rememberMe: false,
                loginData: { phone: '', pass: '' },
                regData: { name: '', phone: '', pass: '' },

                init() {
                    setTimeout(() => {
                        this.showLogo = true;
                        setTimeout(() => { this.step = 'app' }, 1200);
                    }, 1400);

                    // Load local data if available
                    const saved = localStorage.getItem('luci_user');
                    if(saved) {
                        const user = JSON.parse(saved);
                        this.loginData.phone = user.phone;
                        this.rememberMe = true;
                    }
                },

                handleRegister() {
                    if(this.regData.phone.length >= 10 && this.regData.pass.length >= 4) {
                        // Simulation: Saving to a mock database (LocalStorage)
                        // Note: In real app, this should go to Firebase
                        const userData = { phone: this.regData.phone, pass: this.regData.pass };
                        localStorage.setItem('db_user_' + this.regData.phone, JSON.stringify(userData));
                        
                        alert("Account Registered on Cloud! You can now login from any device.");
                        this.view = 'login';
                    } else {
                        alert("Please fill correct details!");
                    }
                },

                handleLogin() {
                    // Check Mock Database
                    const storedUser = localStorage.getItem('db_user_' + this.loginData.phone);
                    
                    if(storedUser) {
                        const user = JSON.parse(storedUser);
                        if(user.pass === this.loginData.pass) {
                            if(this.rememberMe) localStorage.setItem('luci_user', JSON.stringify(user));
                            this.view = 'dashboard';
                            return;
                        }
                    }
                    
                    // Default fallback for testing
                    if(this.loginData.phone === '1234567890' && this.loginData.pass === '1234') {
                        this.view = 'dashboard';
                    } else {
                        alert("Login Failed! No user found with these details.");
                    }
                }
            }
        }
    </script>
</body>
</html>
