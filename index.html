<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucipay</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }

        /* LP Logo with Black Circle */
        .logo-circle {
            background-color: #000000;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
        }

        .logo-text {
            font-size: 60px;
            font-weight: bold;
            color: #d4af37; /* Gold */
            letter-spacing: -2px;
        }

        .brand-name {
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .input-group {
            background-color: #f0f0f0;
            border-radius: 25px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 5px 20px;
        }

        .input-group span { font-size: 18px; margin-right: 10px; }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Remember Me & Links Section */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 5px;
            font-size: 14px;
        }

        .remember-me { display: flex; align-items: center; }
        .remember-me input { width: auto; margin-right: 5px; padding: 0; }

        .privacy-row {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            margin-top: 20px;
        }
        .privacy-row input { width: auto; margin-right: 8px; }

        .hidden { display: none; }
        
        .back-arrow {
            text-align: left;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 10px;
            color: #000;
        }

        .send-otp-btn {
            background-color: #000;
            color: #fff;
            border-radius: 15px;
            padding: 5px 15px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="logo-circle">
            <div class="logo-text">LP</div>
        </div>
        <div class="brand-name">Lucipay</div>

        <div id="login-screen">
            <div class="input-group"><span>👤</span><input type="tel" id="login-phone" placeholder="Phone"></div>
            <div class="input-group"><span>🔒</span><input type="password" id="login-pass" placeholder="Password"></div>
            
            <div class="options-row">
                <a href="javascript:void(0)" onclick="showScreen('register-screen')">Register</a>
                <div class="remember-me">
                    <input type="checkbox" id="rem"> <label for="rem">Remember Me</label>
                </div>
            </div>
                        <script>
        // Normal function to switch screens
        function showScreen(screenId) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('reset-screen').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>

    <div id="recaptcha-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDz3fgsgoS103gEs_T8-NK9Ej4o-v4", 
            authDomain: "lucipay-4f05c.firebaseapp.com",
            databaseURL: "https://lucipay-4f05c-default-rtdb.firebaseio.com",
            projectId: "lucipay-4f05c",
            storageBucket: "lucipay-4f05c.firebasestorage.app",
            messagingSenderId: "44541075910",
            appId: "1:44541075910:web:2ebd7502815ce3db",
            measurementId: "G-X5JX8EG9HD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // OTP Bhejne ka Function
        window.sendOTP = async function() {
            const phoneInput = document.querySelector('#register-screen input[type="tel"]').value;
            if(!phoneInput || phoneInput.length < 10) return alert("Pura number dalein");
            
            const phone = "+91" + phoneInput;

            if (!window.recaptchaVerifier) {
                window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });
            }

            try {
                const confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                window.confirmationResult = confirmationResult;
                alert("OTP send successfully!");
            } catch (error) {
                console.error(error);
                alert("OTP Error: " + error.message);
            }
        };

        // Register Function
        window.handleSignUp = async function() {
            const username = document.querySelector('#register-screen input[placeholder="User Name"]').value;
            const password = document.querySelector('#register-screen input[placeholder="Password"]').value;
            const phoneInput = document.querySelector('#register-screen input[type="tel"]').value;
            const phone = "+91" + phoneInput;
            const otp = document.querySelector('#register-screen input[placeholder="OTP Code"]').value;

            if(!window.confirmationResult) return alert("Please send OTP first");

            try {
                const result = await window.confirmationResult.confirm(otp);
                await setDoc(doc(db, "users", phone), {
                    username: username,
                    password: password,
                    phone: phone,
                    uid: result.user.uid
                });
                alert("Account was created successfully! Please login now.");
                showScreen('login-screen');
            } catch (error) {
                alert("Invalid OTP or Registration Error");
            }
        };

        // Login Function
        window.handleSignIn = async function() {
            const phoneInput = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            
            if(!phoneInput || !pass) return alert("Please enter phone and password");
            
            const phone = "+91" + phoneInput;

            try {
                const userDoc = await getDoc(doc(db, "users", phone));
                if (userDoc.exists()) {
                    if (userDoc.data().password === pass) {
                        alert("Welcome " + userDoc.data().username);
                    } else {
                        alert("Galat Password!");
                    }
                } else {
                    alert("User nahi mila! Pehle register karein.");
                }
            } catch (e) { 
                console.error(e);
                alert("Login Error: Connection check karein"); 
            }
        };
    </script> 
</body>
        </html>
