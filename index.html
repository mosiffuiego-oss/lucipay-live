<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucipay</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            background-color: #ffffff; /* Black to White */
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }

        /* Logo Styling */
        .logo-text {
            font-size: 90px;
            font-weight: bold;
            color: #d4af37; /* Gold Color */
            margin: 0;
            line-height: 1;
        }

        .brand-name {
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Input Fields */
        .input-group {
            background-color: #f5f5f5; /* Light grey background for inputs */
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
        }

        .input-group span {
            font-size: 18px;
            margin-right: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: #000000;
        }

        /* Buttons (Green changed to Black) */
        .btn-main {
            width: 100%;
            padding: 15px;
            background-color: #000000; /* Green to Black */
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-send {
            background-color: #000000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Links */
        .links-container {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        a {
            color: #000000;
            text-decoration: none;
            font-size: 14px;
        }

        .privacy-row {
            text-align: left;
            font-size: 13px;
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .hidden { display: none; }
        
        .back-btn {
            text-align: left;
            font-size: 24px;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="logo-text">LP</div>
        <div class="brand-name">Lucipay</div>

        <div id="login-screen">
            <div class="input-group">
                <span>👤</span>
                <input type="tel" placeholder="Phone">
            </div>
            <div class="input-group">
                <span>🔒</span>
                <input type="password" placeholder="Password">
            </div>
            
            <div class="privacy-row">
                <input type="checkbox" checked> 
                <span>Agree <a href="#" style="text-decoration:underline;">"User Privacy Agreement"</a></span>
            </div>

            <button class="btn-main">Sign In</button>

            <div class="links-container">
                <a href="javascript:void(0)" onclick="showScreen('register-screen')">Register</a>
                <a href="javascript:void(0)" onclick="showScreen('reset-screen')">Forget Password</a>
            </div>
        </div>

        <div id="register-screen" class="hidden">
            <div class="input-group"><span>👤</span><input type="text" placeholder="User Name"></div>
            <div class="input-group"><span>🔒</span><input type="password" placeholder="Password"></div>
            <div class="input-group">
                <span style="font-weight:bold; font-size:14px;">+91</span>
                <input type="tel" placeholder="Phone">
            </div>
            <div class="input-group">
                <span>✉️</span>
                <input type="text" placeholder="OTP Code">
                <button class="btn-send">Send</button>
            </div>
            <div class="input-group"><span>🔗</span><input type="text" placeholder="Invite Code"></div>

            <button class="btn-main">Sign Up</button>
            <p><a href="javascript:void(0)" onclick="showScreen('login-screen')">Already have an account? Login</a></p>
        </div>

        <div id="reset-screen" class="hidden">
            <div class="back-btn" onclick="showScreen('login-screen')">←</div>
            <div class="input-group">
                <span style="font-weight:bold; font-size:14px;">+91</span>
                <input type="tel" placeholder="Phone">
            </div>
            <div class="input-group"><span>🔒</span><input type="password" placeholder="New Password"></div>
            <div class="input-group">
                <span>✉️</span>
                <input type="text" placeholder="OTP Code">
                <button class="btn-send">Send</button>
            </div>

            <button class="btn-main">Reset Password</button>
        </div>

    </div>

    <script>
        // Function to switch between screens
        function showScreen(screenId) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('reset-screen').classList.add('hidden');
            
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>
</body>
</html>
