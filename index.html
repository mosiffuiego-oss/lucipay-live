<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuciPay Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        /* Premium Logo: Black circle, Yellow LP */
        .lp-logo-circle {
            background: #000000;
            color: #FFD700;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-style: italic;
            border-radius: 50%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            font-size: 2.2rem;
            border: 3px solid #FFD700;
        }

        .btn-action {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 12px 24px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        .btn-action:active { transform: scale(0.95); }

        /* Animation Logic */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-content { animation: fadeInUp 0.8s ease-out forwards; }
    </style>
</head>
<body x-data="luciApp()" class="bg-slate-50 overflow-hidden">

    <div x-show="step === 'splash'" class="fixed inset-0 z-50 bg-white flex items-center justify-center">
        <h1 x-show="!showLP" x-transition.opacity.duration.500ms class="text-6xl font-black text-emerald-600 italic tracking-tighter">LuciPay</h1>
        <div x-show="showLP" x-transition:enter="transition ease-out duration-700" x-transition:enter-start="scale-0" x-transition:enter-end="scale-100" class="lp-logo-circle">LP</div>
    </div>

    <div x-show="step !== 'splash'" x-cloak class="min-h-screen flex flex-col items-center p-8">
        
        <div class="mt-2 mb-12 lp-logo-circle scale-90">LP</div>

        <div x-show="view === 'login'" class="w-full max-w-sm space-y-7 animate-content">
            <div class="text-center">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Login LuciPay User</h2>
                <p class="text-slate-400 font-bold text-sm mt-2">Enter your credentials to access wallet</p>
            </div>

            <div class="space-y-4">
                <input type="number" placeholder="Phone Number" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-5 outline-none focus:border-emerald-500 transition-all font-semibold" x-model="form.phone">
                <input type="password" placeholder="Password" class="w-full bg-white border-2 border-slate-100 rounded-2xl p-5 outline-none focus:border-emerald-500 transition-all font-semibold" x-model="form.pass">
            </div>

            <div class="flex items-center justify-between px-2">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" x-model="form.remember" class="w-5 h-5 text-emerald-600 rounded">
                    <span class="text-sm font-bold text-slate-500">Remember Me</span>
                </label>
                <button class="text-sm font-black text-emerald-600">Forgot Password?</button>
            </div>

            <button @click="login()" class="w-full btn-action text-white py-5 rounded-[22px] font-black text-lg shadow-xl uppercase tracking-widest">
                Login Now
            </button>

            <p class="text-center font-bold text-slate-400">
                New User? <span @click="view = 'register'" class="text-emerald-600 cursor-pointer underline">Create Account</span>
            </p>
        </div>

        <div x-show="view === 'dashboard'" class="w-full max-w-sm animate-content">
            <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl">
                <p class="text-emerald-400 text-xs font-black uppercase tracking-widest">Net Balance</p>
                <h3 class="text-5xl font-black mt-3 italic">₹0.00</h3>
            </div>
